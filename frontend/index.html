<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Management System</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <div class="header-left">
    <div class="app-logo">P</div>
    <h1>Project Management System</h1>
  </div>
  <div class="header-right">
    <button id="btn-dark-mode" title="Toggle dark mode">🌙</button>
    <button id="btn-manage-users">Team Members</button>
  </div>
</header>

<div class="container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-label">Projects</span>
      <button id="btn-new-project">+ New</button>
    </div>
    <ul id="project-list"></ul>
  </aside>

  <main class="main-content">
    <div id="no-project-msg">Select or create a project to get started.</div>

    <div id="project-board" class="hidden">
      <div class="board-header">
        <h2 id="project-title"></h2>
        <div class="btn-group">
          <button id="btn-new-task" class="btn-primary">+ Add Task</button>
          <button id="btn-edit-project" class="btn-secondary">Edit</button>
          <button id="btn-delete-project" class="btn-danger">Delete</button>
        </div>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" data-tab="kanban">Kanban</button>
        <button class="tab-btn" data-tab="gantt">Gantt Chart</button>
      </div>

      <!-- Kanban view -->
      <div id="view-kanban" class="tab-view">
        <div class="kanban-board">
          <div class="column" data-status="todo">
            <div class="column-header">
              <span class="column-dot"></span>
              <span class="column-title">To Do</span>
              <span class="column-count" id="count-todo"></span>
            </div>
            <div class="task-list" id="col-todo"></div>
          </div>
          <div class="column" data-status="in_progress">
            <div class="column-header">
              <span class="column-dot"></span>
              <span class="column-title">In Progress</span>
              <span class="column-count" id="count-in-progress"></span>
            </div>
            <div class="task-list" id="col-in-progress"></div>
          </div>
          <div class="column" data-status="done">
            <div class="column-header">
              <span class="column-dot"></span>
              <span class="column-title">Done</span>
              <span class="column-count" id="count-done"></span>
            </div>
            <div class="task-list" id="col-done"></div>
          </div>
        </div>
      </div>

      <!-- Gantt view -->
      <div id="view-gantt" class="tab-view hidden">
        <div class="gantt-container">
          <div class="gantt-sidebar">
            <div class="gantt-sidebar-header">
              <span>Activities</span>
              <button id="btn-add-activity" class="btn-primary btn-sm">+ Add</button>
            </div>
            <div id="gantt-activity-list"></div>
          </div>
          <div class="gantt-chart-panel" id="gantt-chart-panel">
            <div id="gantt-chart-inner"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Project Modal -->
<div id="modal-project" class="modal hidden">
  <div class="modal-content">
    <h2 id="modal-project-title">New Project</h2>
    <form id="form-project">
      <label>Name
        <input type="text" name="name" required placeholder="e.g. Website Redesign">
      </label>
      <label>Description
        <textarea name="description" placeholder="Optional description"></textarea>
      </label>
      <div class="form-row">
        <label>Start Date
          <input type="date" name="start_date">
        </label>
        <label>End Date
          <input type="date" name="end_date">
        </label>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Save Project</button>
      </div>
    </form>
  </div>
</div>

<!-- Task Modal -->
<div id="modal-task" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-task-title">New Task</h2>
      <button id="btn-delete-task" class="btn-danger btn-sm hidden">Delete</button>
    </div>
    <form id="form-task">
      <label>Title
        <input type="text" name="title" required placeholder="e.g. Design homepage mockup">
      </label>
      <label>Description
        <textarea name="description" placeholder="Optional details"></textarea>
      </label>
      <div class="form-row">
        <label>Status
          <select name="status">
            <option value="todo">To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </label>
        <label>Priority
          <select name="priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </label>
      </div>
      <div class="form-row">
        <label>Start Date
          <input type="date" name="start_date">
        </label>
        <label>Due Date
          <input type="date" name="due_date">
        </label>
      </div>
      <div class="form-row">
        <label>Assignee
          <select name="assignee_id">
            <option value="">— Unassigned —</option>
          </select>
        </label>
        <label>Progress
          <div class="range-row">
            <input type="range" name="progress" id="progress-range" min="0" max="100" value="0">
            <span class="range-val" id="progress-display">0%</span>
          </div>
        </label>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Save Task</button>
      </div>
    </form>
  </div>
</div>

<!-- Users Modal -->
<div id="modal-users" class="modal hidden">
  <div class="modal-content">
    <h2>Team Members</h2>
    <ul id="user-list"></ul>
    <form id="form-user">
      <div class="form-row">
        <label>Name
          <input type="text" name="name" placeholder="Full name" required>
        </label>
        <label>Email
          <input type="email" name="email" placeholder="Email address" required>
        </label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">Add Member</button>
        <button type="button" class="btn-cancel btn-secondary">Close</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>

<script src="/static/app.js"></script>
</body>
</html>
